name: Production Deploy Docker

on:
  push:
    branches: [ "main" ] # Hoặc nhánh muốn deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jobhunt-be:latest
          # Nếu dùng Gradle, Dockerfile của bạn nên có bước build jar bên trong

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: chatbot.ptha.io.vn
          username: itadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 13026
          script: |
            cd ~/app
            docker compose pull
            docker compose up -d
            docker image prune -f